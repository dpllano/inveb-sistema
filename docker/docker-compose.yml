# ===========================================
# INVEB - Docker Compose Produccion
# ===========================================
#
# Uso:
#   docker compose -f docker/docker-compose.yml up -d
#
# Para ver logs:
#   docker compose -f docker/docker-compose.yml logs -f
#
# Para detener:
#   docker compose -f docker/docker-compose.yml down
#
# Para reconstruir:
#   docker compose -f docker/docker-compose.yml up -d --build
#
# ===========================================

version: '3.8'

services:
  # ===========================================
  # NGINX - Reverse Proxy
  # ===========================================
  nginx:
    image: nginx:alpine
    container_name: inveb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx-logs:/var/log/nginx
    depends_on:
      frontend:
        condition: service_healthy
      backend:
        condition: service_healthy
    networks:
      - inveb-network
    restart: always

  # ===========================================
  # FRONTEND - React Application
  # ===========================================
  frontend:
    build:
      context: ../frontend
      dockerfile: ../docker/Dockerfile.frontend
      args:
        - VITE_API_URL=/api
    container_name: inveb-frontend
    networks:
      - inveb-network
    restart: always
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ===========================================
  # BACKEND - FastAPI Application
  # ===========================================
  backend:
    build:
      context: ../backend
      dockerfile: ../docker/Dockerfile.backend
    container_name: inveb-backend
    environment:
      - LARAVEL_MYSQL_HOST=${DB_HOST:-db}
      - LARAVEL_MYSQL_PORT=${DB_PORT:-3306}
      - LARAVEL_MYSQL_USER=${DB_USER}
      - LARAVEL_MYSQL_PASSWORD=${DB_PASSWORD}
      - LARAVEL_MYSQL_DATABASE=${DB_NAME:-envases_ot}
      - JWT_SECRET_KEY=${JWT_SECRET}
      - JWT_ALGORITHM=HS256
      - JWT_ACCESS_TOKEN_EXPIRE_MINUTES=1440
      - ENVIRONMENT=production
      - DEBUG=false
    depends_on:
      db:
        condition: service_healthy
    networks:
      - inveb-network
    restart: always
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ===========================================
  # DATABASE - MySQL 8.0
  # ===========================================
  db:
    image: mysql:8.0
    container_name: inveb-mysql
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_NAME:-envases_ot}
      MYSQL_USER: ${DB_USER}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    volumes:
      - mysql-data:/var/lib/mysql
      - ./mysql/init:/docker-entrypoint-initdb.d:ro
    ports:
      - "${DB_EXTERNAL_PORT:-3306}:3306"
    networks:
      - inveb-network
    restart: always
    command: >
      --default-authentication-plugin=mysql_native_password
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
      --max_connections=200
      --innodb_buffer_pool_size=256M
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-p${DB_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

# ===========================================
# NETWORKS
# ===========================================
networks:
  inveb-network:
    driver: bridge

# ===========================================
# VOLUMES
# ===========================================
volumes:
  mysql-data:
    driver: local
  nginx-logs:
    driver: local
